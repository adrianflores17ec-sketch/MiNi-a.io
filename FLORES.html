<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MiNiña.io</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── DISEÑO BASE ── */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body { 
  height: 100vh; 
  height: 100dvh; 
  overflow: hidden; 
  background: radial-gradient(circle at 50% 30%, #1a1a2e, #000); 
  font-family: 'Space Grotesk', Arial, sans-serif; 
  color: white; 
}

/* ── PANTALLA INICIAL ── */
#startScreen { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; background: radial-gradient(circle at 50% 30%, #1a1a2e, #000); cursor: pointer; }
.start-logo { font-family: 'Press Start 2P', monospace; font-size: 14px; color: #ff4d8d; text-shadow: 0 0 30px rgba(255,77,141,0.7), 0 0 60px rgba(255,77,141,0.3); letter-spacing: 3px; }
.start-tap { font-family: 'Press Start 2P', monospace; font-size: 7px; color: rgba(255,255,255,0.35); letter-spacing: 2px; animation: blink-txt 1.2s step-start infinite; }
@keyframes blink-txt { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── CARGA ── */
#loading { position: fixed; inset: 0; z-index: 90; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: #000; }
.retro-load-title { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #ff4d8d; text-shadow: 0 0 14px rgba(255,77,141,0.8); letter-spacing: 2px; }
.retro-bar-wrap { width: 260px; height: 22px; background: #111; border: 2px solid #2a2a2a; border-radius: 2px; padding: 3px; position: relative; }
.retro-bar-fill { height: 100%; width: 0%; border-radius: 1px; background: repeating-linear-gradient(90deg, #ff4d8d 0px, #ff4d8d 10px, #c9184a 10px, #c9184a 14px); transition: width .03s linear; }
.retro-percent { font-family: 'Press Start 2P', monospace; font-size: 9px; color: #888; letter-spacing: 1px; }

/* ── ELEMENTOS VISUALES ── */
.star-field { position: fixed; inset: 0; pointer-events: none; background-image: radial-gradient(circle,#fff 1px,transparent 1px); background-size: 120px 120px; opacity: .14; animation: stars 40s linear infinite; }
@keyframes stars { to { transform: translateY(-100px); } }
.background-words { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
.background-words span { position: absolute; bottom: -80px; font-size: .7rem; color: rgba(255,255,255,.18); animation: texto linear infinite; }
@keyframes texto { 0% { opacity:0; transform:translateY(0); } 30% { opacity:.5; } 100% { opacity:0; transform:translateY(-120vh); } }

/* ── MAIN CONTAINER AJUSTADO ── */
.main-container { 
  display: none; 
  height: 100dvh; 
  width: 100%;
  position: relative; 
  z-index: 5; 
  flex-direction: column; 
  align-items: center; 
  overflow: hidden;
  justify-content: flex-start;
  /* El padding bottom asegura que snoopy no sea tapado por la barra de gestos de Honor/Redmi */
  padding-bottom: env(safe-area-inset-bottom, 20px); 
}

.app-header { width: 100%; padding: 40px 0 10px; text-align: center; flex-shrink: 0; }
.app-title { font-family: 'Press Start 2P', monospace; font-size: 8px; color: rgba(255,255,255,0.22); letter-spacing: 4px; }

.games-home { 
  display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; 
  width: 90%; max-width: 380px; margin-top: 8px; flex-shrink: 0;
}

/* ── BOTONES ORIGINALES ── */
.mini-card { 
  height: 120px; border-radius: 4px; 
  display: flex; align-items: center; justify-content: center; flex-direction: column; 
  cursor: pointer; position: relative; overflow: hidden; color: white; 
  transition: transform .12s, filter .12s; 
  outline: 2px solid rgba(255,255,255,0.12); outline-offset: -2px; 
}
.mini-card::before { 
  content: ""; position: absolute; inset: 0; z-index: 1; pointer-events: none; 
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px); 
}
.card-inner { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 9px; }
.card-emoji { font-size: 30px; }
.card-label { font-family: 'Press Start 2P', monospace; font-size: 7px; text-align: center; line-height: 1.7; text-shadow: 2px 2px 0 rgba(0,0,0,0.5); }

.mini-card:nth-child(1) { background:linear-gradient(135deg,#c9184a,#ff4d6d); box-shadow:0 0 0 2px #ff4d6d,3px 3px 0 #7b0028; }
.mini-card:nth-child(2) { background:linear-gradient(135deg,#1971c2,#339af0); box-shadow:0 0 0 2px #339af0,3px 3px 0 #0c3d6b; }
.mini-card:nth-child(3) { background:linear-gradient(135deg,#2f9e44,#69db7c); box-shadow:0 0 0 2px #69db7c,3px 3px 0 #145523; }
.mini-card:nth-child(4) { background:linear-gradient(135deg,#6741d9,#b197fc); box-shadow:0 0 0 2px #b197fc,3px 3px 0 #2c1a6b; }

/* ── BOTÓN BUZÓN ── */
.btn-mailbox { 
  margin-top: 15px; width: 90%; max-width: 380px; height: 68px; 
  border-radius: 10px; background: #080812; border: none; 
  cursor: pointer; position: relative; overflow: hidden; 
  display: flex; align-items: center; gap: 12px; padding: 0 16px; 
  box-shadow: 0 0 0 1px rgba(255,100,180,0.3), 0 0 22px rgba(255,80,150,0.18); 
  transition: transform .15s; flex-shrink: 0;
}
.mail-icon-box { 
  width: 40px; height: 40px; flex-shrink: 0; border-radius: 9px; 
  background: linear-gradient(135deg,#ff477e,#ff9ec4); 
  display: flex; align-items: center; justify-content: center; font-size: 19px; 
  box-shadow: 0 0 14px rgba(255,80,150,0.5); 
  animation: pulse-mail 3s ease-in-out infinite;
}
@keyframes pulse-mail { 0%,100%{box-shadow:0 0 14px rgba(255,80,150,0.5)} 50%{box-shadow:0 0 26px rgba(255,80,150,0.82)} }

.mail-text { display: flex; flex-direction: column; gap: 2px; flex: 1; text-align: left; }
.mail-title { font-size: 14px; font-weight: 600; color: #fff; }
.mail-sub { font-size: 10px; color: rgba(255,150,200,0.6); }

/* ── SNOOPY AREA CORREGIDA ── */
.snoopy-area { 
  flex: 1; 
  display: flex; 
  align-items: flex-end; 
  justify-content: center; 
  width: 100%; 
  overflow: hidden;
  /* Esto empuja a Snoopy al fondo real del contenedor */
  margin-top: auto;
}
.snoopy-frame { 
  width: 152px; 
  height: auto;
  max-height: 180px;
  object-fit: contain;
  animation: respirar 2.5s ease-in-out infinite; 
  filter: drop-shadow(0 10px 12px rgba(0,0,0,0.8)); 
}
@keyframes respirar { 50%{ transform:translateY(-8px); } }

/* ── CHAT ── */
#mailModal { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.82); display: none; align-items: flex-end; justify-content: center; }
#mailModal.open { display: flex; }
.mail-sheet { width: 100%; max-width: 480px; height: 92dvh; background: #0d0d1f; border-radius: 24px 24px 0 0; display: flex; flex-direction: column; overflow: hidden; animation: slideUp .32s cubic-bezier(.22,1,.36,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.sheet-header { display: flex; align-items: center; gap: 11px; padding: 16px; background: #111125; border-bottom: 0.5px solid rgba(255,255,255,0.06); flex-shrink: 0; }
.header-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#ff477e,#ffb3cc); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.header-name { font-size: 15px; font-weight: 600; color: #fff; flex: 1; }
.header-status { font-size: 11px; color: #4ade80; }
.header-close { background: rgba(255,255,255,0.07); border: none; border-radius: 50%; width: 30px; height: 30px; color: #fff; cursor: pointer; }

.chat-bg { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #0d0d1f; }
.msg-lizeth { align-self: flex-end; max-width: 85%; display: flex; flex-direction: column; align-items: flex-end; }
.msg-lizeth .bubble { background: linear-gradient(135deg, #c9184a, #ff4d6d); padding: 10px 14px; border-radius: 15px 15px 2px 15px; font-size: 14px; color: #fff; box-shadow: 0 4px 10px rgba(255,77,141,0.2); }
.msg-el { align-self: flex-start; max-width: 85%; }
.msg-el-name { font-size: 10px; color: #ff4d8d; margin-bottom: 2px; }
.msg-el .bubble { background: #1e1e38; padding: 10px 14px; border-radius: 15px 15px 15px 2px; font-size: 14px; border: 0.5px solid rgba(255,255,255,0.1); }
.msg-meta { font-size: 9px; color: rgba(255,255,255,0.4); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.visto-blue { color: #4ade80; font-weight: bold; }

.chat-input-bar { padding: 15px; background: #111125; display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
.chat-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,77,141,0.2); padding: 12px 18px; border-radius: 25px; color: #fff; font-family: inherit; font-size: 16px; outline: none; }
.chat-send-btn { width: 45px; height: 45px; border-radius: 50%; background: #ff477e; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

.unread-badge { position: absolute; top: -5px; right: -5px; background: #ff4757; color: white; font-family: 'Press Start 2P'; font-size: 8px; padding: 4px 6px; border-radius: 50%; border: 2px solid #080812; display: none; z-index: 10; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #ff477e; padding: 10px 20px; border-radius: 20px; transition: 0.4s; z-index: 1000; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* MEDIA QUERY PARA DISPOSITIVOS CORTOS */
@media (max-height: 650px) {
  .app-header { padding: 20px 0 5px; }
  .mini-card { height: 100px; }
  .snoopy-frame { width: 120px; }
}

/* ── REGALO SECRETO ── */
.secret-gift-btn {
  position: fixed;
  bottom: 25px;
  right: 25px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff477e, #ff9ec4);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 95;
  box-shadow: 0 0 15px rgba(255, 71, 126, 0.6), 0 4px 10px rgba(0,0,0,0.4);
  border: 1px solid rgba(255, 255, 255, 0.3);
  animation: pulse-glow 2.5s infinite, float-btn 3s ease-in-out infinite;
  -webkit-tap-highlight-color: transparent;
}
.secret-gift-btn .gift-emoji {
  font-size: 22px;
  line-height: 1;
  margin-bottom: 2px;
}
.secret-gift-btn .gift-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 8px;
  font-weight: 600;
  color: white;
  line-height: 1;
}
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 15px rgba(255, 71, 126, 0.6), 0 4px 10px rgba(0,0,0,0.4); }
  50% { box-shadow: 0 0 25px rgba(255, 71, 126, 0.9), 0 8px 15px rgba(0,0,0,0.5); }
}
@keyframes float-btn {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* ── CINEMÁTICA OVERLAY ── */
#cinematicContainer {
  position: fixed;
  inset: 0;
  background-color: #000;
  z-index: 9999;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 1s ease;
}
.cinematic-msg {
  position: absolute;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 500;
  color: #fff;
  text-align: center;
  padding: 0 20px;
  opacity: 0;
  transition: opacity 1s ease;
  z-index: 2;
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}
#cinematicVideo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1s ease;
  z-index: 1;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="startScreen">
  <div class="start-logo">✦ MiNiña.io ✦</div>
  <div class="start-tap">toca para iniciar</div>
</div>

<div id="loading">
  <div class="retro-load-title">cargando MiNiña.io...</div>
  <div class="retro-bar-wrap">
    <div class="retro-bar-fill" id="barFill"></div>
  </div>
  <div class="retro-percent" id="percent">0%</div>
</div>

<audio id="music" loop><source src="musica.mp3"></audio>
<div class="star-field"></div>
<div class="background-words" id="words"></div>

<div class="main-container" id="main">
  <div class="app-header"><div class="app-title">✦ MiNiña.io ✦</div></div>
  <div class="games-home">
    <div class="mini-card" onclick="location.href='pupiletras.html'"><div class="card-inner"><span class="card-emoji">🍜</span><span class="card-label">Sopa de letras</span></div></div>
    <div class="mini-card" onclick="location.href='preguntas.html'"><div class="card-inner"><span class="card-emoji">❓</span><span class="card-label">Preguntas</span></div></div>
    <div class="mini-card" onclick="window.location.href='juego/index.html'"><div class="card-inner"><span class="card-emoji">🌊</span><span class="card-label">Lizeth</span></div></div>
    <div class="mini-card" onclick="alert('No tuve tiempo, perdón 😭. Se fue el presupuesto en la galaxia 😭')"><div class="card-inner"><span class="card-emoji">🎁</span><span class="card-label">Sorpresa</span></div></div>
  </div>
  
  <button class="btn-mailbox" onclick="openMail()">
    <div class="unread-badge" id="mainBadge">0</div>
    <div class="mail-icon-box">💌</div>
    <div class="mail-text">
        <span class="mail-title">Chat.me</span>
        <span class="mail-sub">Tienes mensajes nuevos</span>
    </div>
  </button>
  
  <div class="snoopy-area"><img id="snoopy" src="1.png" class="snoopy-frame"></div>
</div>

<div class="toast" id="toast">Enviado con éxito ✨</div>

<div id="mailModal">
  <div class="mail-sheet">
    <div class="sheet-header">
      <div class="header-avatar">👤</div>
      <div class="header-name">Él <br><span class="header-status">online</span></div>
      <button class="header-close" onclick="closeMail()">✕</button>
    </div>
    <div class="chat-bg" id="chatBg"></div>
    <div class="chat-input-bar">
        <input type="text" class="chat-input" id="userMsg" placeholder="Escribe un mensaje, Lizeth..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="chat-send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<div class="secret-gift-btn" onclick="playSecretCinematic()">
  <span class="gift-emoji">🎁</span>
  <span class="gift-text">Para ti</span>
</div>

<div id="cinematicContainer">
  <video id="cinematicVideo" src="video/regalo.mp4" playsinline webkit-playsinline></video>
  <div id="cinematicTextStart" class="cinematic-msg">Para la persona más importante de mi vida ❤️</div>
  <div id="cinematicTextEnd" class="cinematic-msg">Gracias por compartir tantos momentos conmigo ❤️</div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbw2jtXraRKYpvKZbn_XosPLdXirG2PpnKsLiQGMXxZ7CXzXZX3uY2rjB6IB0uxcmYr0/exec";

let messageCount = 0;
let firstLoad = true;

/* ── INICIO ── */
document.getElementById("startScreen").onclick = () => {
  document.getElementById("music").play().catch(()=>{});
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("loading").style.display = "flex";
  
  if ("Notification" in window) { Notification.requestPermission(); }
  fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "logVisit" }) });
  
  loadMessages(); 
  let p = 0;
  const t = setInterval(() => {
    p++;
    document.getElementById("barFill").style.width = p + "%";
    document.getElementById("percent").textContent = p + "%";
    if (p >= 100) { clearInterval(t); document.getElementById("loading").style.display = "none"; document.getElementById("main").style.display = "flex"; }
  }, 30);
};

/* ── SNOOPY ── */
let frame = 1;
setInterval(() => { frame = frame >= 8 ? 1 : frame + 1; document.getElementById("snoopy").src = frame + ".png"; }, 250);

/* ── CHAT ── */
async function openMail() {
  document.getElementById("mailModal").classList.add("open");
  scrollChat();
  fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "markAsRead" }) });
  setTimeout(loadMessages, 1000);
}

function closeMail() { document.getElementById("mailModal").classList.remove("open"); }

async function loadMessages() {
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    const chatBg = document.getElementById("chatBg");
    chatBg.innerHTML = ""; 
    
    if (!firstLoad && data.length > messageCount) {
        const lastMsg = data[data.length - 1];
        if (lastMsg.nombre.toLowerCase() !== "lizeth") { showBrowserNotification(lastMsg.mensaje); }
    }
    messageCount = data.length;
    firstLoad = false;

    let unreadCount = 0;
    data.forEach(m => {
        const isLizeth = (m.nombre.toLowerCase() === "lizeth");
        if(!isLizeth && m.leido !== "si") unreadCount++;
        const msgDiv = document.createElement("div");
        msgDiv.className = isLizeth ? "msg-lizeth" : "msg-el";
        const time = m.fecha.split(",")[1] || m.fecha;
        const ticks = !isLizeth ? `<span class="${m.leido === 'si' ? 'visto-blue' : ''}">✓✓</span>` : "";
        msgDiv.innerHTML = `
            ${!isLizeth ? `<div class="msg-el-name">${m.nombre}</div>` : ''}
            <div class="bubble">${m.mensaje}</div>
            <div class="msg-meta"><span>${time}</span>${ticks}</div>
        `;
        chatBg.appendChild(msgDiv);
    });
    const badge = document.getElementById("mainBadge");
    if(unreadCount > 0) { badge.innerText = unreadCount; badge.style.display = "block"; } 
    else { badge.style.display = "none"; }
    scrollChat();
  } catch (e) { console.error(e); }
}

function showBrowserNotification(text) {
    if ("Notification" in window && Notification.permission === "granted") {
        new Notification("Él te escribió 💌", { body: text, icon: "1.png" });
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
}

async function sendMessage() {
  const input = document.getElementById("userMsg");
  const msg = input.value.trim();
  if(!msg) return;
  const fecha = new Date().toLocaleString("es-PE", {hour12:true, hour:'2-digit', minute:'2-digit'});
  const chatBg = document.getElementById("chatBg");
  const tempDiv = document.createElement("div");
  tempDiv.className = "msg-lizeth";
  tempDiv.innerHTML = `<div class="bubble">${msg}</div><div class="msg-meta">${fecha}</div>`;
  chatBg.appendChild(tempDiv);
  scrollChat();
  input.value = "";
  try {
    await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ nombre: "Lizeth", mensaje: msg, fecha: fecha }) });
    showToast();
    messageCount++;
    setTimeout(loadMessages, 2000); 
  } catch (e) { console.error(e); }
}

function scrollChat() { const cb = document.getElementById("chatBg"); if(cb) cb.scrollTop = cb.scrollHeight; }
function showToast() { const t = document.getElementById("toast"); t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); }


const phrases = [
            "¿me odias?", "¿ya no me amas?", "¿por qué el silencio?", 
            "¿hice algo mal?", "¿ya no me quieres?", "¿estás molesta?", 
            "¿te aburriste de mi?", "¿ya no te importo?", 
            "¿te cansaste?", "¿ya no me piensas?", 
            "¿qué pasó?", "¿me vas a olvidar?", "¿ya no hay amor?"
        ];
for (let i = 0; i < 15; i++) {
  const s = document.createElement("span");
  s.textContent = phrases[Math.floor(Math.random() * phrases.length)];
  s.style.left = Math.random() * 90 + "%";
  s.style.animationDuration = (25 + Math.random() * 20) + "s";
  document.getElementById("words").appendChild(s);
}

document.querySelectorAll('.mini-card')[2].onclick = function(){
  alert('No está terminado del todo, perdón. Entre el trabajo y los exámenes el juego está en un 70%. Tiene algunas fallas y es difícil terminarlo, y aparte creo que ya no habría motivo para terminarlo ://');
  window.location.href='juego/index.html';
};

setInterval(loadMessages, 10000);

/* ── LÓGICA DE LA CINEMÁTICA ── */
function playSecretCinematic() {
  const container = document.getElementById('cinematicContainer');
  const video = document.getElementById('cinematicVideo');
  const textStart = document.getElementById('cinematicTextStart');
  const textEnd = document.getElementById('cinematicTextEnd');
  const bgMusic = document.getElementById('music');

  // Pausar música de fondo del juego
  if (bgMusic) bgMusic.pause();

  // Mostrar contenedor (fade in negro)
  container.style.display = 'flex';
  
  // Timeout ligero para que el navegador procese el display: flex antes de aplicar la opacidad
  setTimeout(() => {
    container.style.opacity = '1';

    // Mostrar el primer texto después de que el fondo negro esté visible
    setTimeout(() => {
      textStart.style.opacity = '1';

      // Ocultar el primer texto después de 2 segundos
      setTimeout(() => {
        textStart.style.opacity = '0';

        // Iniciar el video después de que el texto desaparezca
        setTimeout(() => {
          video.style.opacity = '1';
          video.play().catch(err => console.log('El video necesita interacción previa:', err));

          // Cuando el video termine
          video.onended = () => {
            video.style.opacity = '0';

            // Mostrar el texto final
            setTimeout(() => {
              textEnd.style.opacity = '1';

              // Ocultar el texto final después de 2 segundos
              setTimeout(() => {
                textEnd.style.opacity = '0';

                // Fade out del contenedor completo y volver al juego
                setTimeout(() => {
                  container.style.opacity = '0';
                  
                  setTimeout(() => {
                    container.style.display = 'none';
                    // Reanudar música de fondo
                    if (bgMusic) bgMusic.play().catch(()=>{});
                  }, 1000);
                  
                }, 1000); // Tiempo del fade del texto

              }, 2000); // Tiempo que dura el texto final visible

            }, 1000); // Tiempo del fade out del video

          };

        }, 1000); // Tiempo del fade out del texto inicial

      }, 2000); // Tiempo que dura el texto inicial visible

    }, 1000); // Tiempo del fade in del contenedor negro

  }, 50);
}
</script>
</body>
</html>
