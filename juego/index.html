<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lizeth Tsunami | Honor Edition</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- AVISO DE ROTACIÓN -->
    <div id="rotate-device">
        <div class="rotate-content">
            <div class="phone-icon">🔄</div>
            <h2>¡Gira tu pantalla!</h2>
            <p>Lizeth Tsunami se juega en modo horizontal.</p>
        </div>
    </div>

    <!-- PANTALLA DE CARGA -->
    <div id="loading-screen">
        <div class="loader-container">
            <h1 class="loading-title">LIZETH TSUNAMI</h1>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
            <p id="loading-text">Iniciando recursos...</p>
        </div>
    </div>

    <!-- MENÚ PRINCIPAL -->
    <div id="main-menu" style="display: none;">
        <div class="menu-card">
            <h1 class="game-title">LIZETH <span>TSUNAMI</span></h1>
            <div class="selection-container">
                <button class="nav-btn" id="prev-skin">‹</button>
                <div class="skin-display">
                    <div class="glow"></div>
                    <img id="skin-img-preview" src="">
                    <div class="skin-info"><span id="skin-name">LIZETH 1</span></div>
                </div>
                <button class="nav-btn" id="next-skin">›</button>
            </div>
            <button id="start-btn">EMPEZAR PARTIDA</button>
        </div>
    </div>

    <!-- UI DEL JUEGO -->
    <div id="ui" style="display: none;">
        <div class="stat-card">
            <span class="icon">💰</span>
            <div class="stat-val"><small>ORO</small><span id="gold-count">0</span></div>
        </div>
        <div class="stat-card">
            <span class="icon">👯</span>
            <div class="stat-val"><small>HORDA</small><span id="lizeth-count">1</span></div>
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="game-over-screen" style="display: none;">
        <div class="menu-card">
            <h1>¡FIN DEL JUEGO!</h1>
            <button id="restart-btn">REINTENTAR</button>
        </div>
    </div>

    <canvas id="game"></canvas>

    <!-- SCRIPTS -->
    <script src="js/item.js"></script>
    <script src="js/player.js"></script>
    <script src="js/input.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
